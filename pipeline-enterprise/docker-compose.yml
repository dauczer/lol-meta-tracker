---
# Local Airflow + Postgres stack for enterprise reference development.
#
# Usage:
#   docker compose up -d
#   open http://localhost:8080  (user: airflow / pass: airflow)
#
# This is NOT used by the portfolio pipeline — it's here to demonstrate
# the production-grade infrastructure setup.

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.0
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__SECRET_KEY: 'portfolio-demo-key'
    RIOT_API_KEY: ${RIOT_API_KEY}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ../../pipeline:/opt/airflow/pipeline        # mount the actual pipeline code
    - ../../data:/opt/airflow/data
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    volumes:
      - postgres-db:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username airflow
          --firstname Airflow
          --lastname Admin
          --role Admin
          --email admin@example.com
          --password airflow
      "
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

volumes:
  postgres-db:
  airflow-logs:
