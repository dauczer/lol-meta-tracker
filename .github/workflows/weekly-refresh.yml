name: Weekly Meta Refresh

on:
  schedule:
    - cron: '0 6 * * 1'   # 06:00 UTC every Monday
  workflow_dispatch:        # Manual trigger from Actions UI

concurrency:
  group: weekly-refresh
  cancel-in-progress: false  # Let a running refresh finish; don't cancel mid-commit

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.lock

      - name: Restore pipeline cache
        uses: actions/cache@v4
        with:
          path: data/cache
          key: pipeline-cache-${{ github.run_id }}
          restore-keys: |
            pipeline-cache-

      - name: Test API connection
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
        run: pytest tests/test_api_connection.py -v

      - name: Run pipeline
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
        run: python -m pipeline.main

      - name: Commit and push updated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/output/
          git diff --staged --quiet || git commit -m "chore: update meta data $(date -u +%Y-%m-%d)"
          git push
