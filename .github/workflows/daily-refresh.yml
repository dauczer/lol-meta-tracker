name: Weekly Meta Refresh

on:
  schedule:
    - cron: '0 6 * * 1'   # 06:00 UTC every Monday
  workflow_dispatch:        # Manual trigger from Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test API connection
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
        run: pytest tests/test_api_connection.py -v

      - name: Run pipeline
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
        run: python -m pipeline.main

      - name: Commit and push updated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/output/ data/raw/
          git diff --staged --quiet || git commit -m "chore: update meta data $(date -u +%Y-%m-%d)"
          git push
